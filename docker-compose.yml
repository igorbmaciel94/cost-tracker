services:
  db:
    image: postgres:16
    container_name: cost-tracker-db
    environment:
      POSTGRES_DB: costtracker
      POSTGRES_USER: costtracker
      POSTGRES_PASSWORD: costtracker
    ports:
      - "5432:5432"
    volumes:
      - cost_tracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costtracker -d costtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cost-tracker-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=costtracker;Username=costtracker;Password=costtracker
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: cost-tracker-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  cost_tracker_pgdata:
