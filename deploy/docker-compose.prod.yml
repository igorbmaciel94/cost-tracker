services:
  web:
    image: ghcr.io/${GHCR_OWNER}/cost-tracker-web:${IMAGE_TAG}
    container_name: cost-tracker-web
    restart: unless-stopped
    ports:
      - "${APP_WEB_BIND_ADDRESS}:${APP_WEB_BIND_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - edge

  api:
    image: ghcr.io/${GHCR_OWNER}/cost-tracker-api:${IMAGE_TAG}
    container_name: cost-tracker-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Default: Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};SSL Mode=${DB_SSL_MODE}
    ports:
      - "${APP_API_BIND_ADDRESS}:${APP_API_BIND_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/months || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks:
      - edge

networks:
  edge:
    driver: bridge
