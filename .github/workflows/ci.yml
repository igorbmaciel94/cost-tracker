name: CI

on:
  push:
    branches: [main, codex/ajustes-login-buffer-metas]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet restore backend/CostTracker.sln
      - run: dotnet build backend/CostTracker.sln --no-restore --configuration Release
      - run: dotnet test backend/CostTracker.sln --no-build --configuration Release --verbosity normal
