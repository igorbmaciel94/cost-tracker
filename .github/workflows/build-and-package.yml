name: Build And Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          API_IMAGE="ghcr.io/${{ github.repository_owner }}/cost-tracker-api"
          WEB_IMAGE="ghcr.io/${{ github.repository_owner }}/cost-tracker-web"

          API_TAGS="${API_IMAGE}:sha-${SHORT_SHA}"
          WEB_TAGS="${WEB_IMAGE}:sha-${SHORT_SHA}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            API_TAGS+=$'\n'"${API_IMAGE}:main"
            WEB_TAGS+=$'\n'"${WEB_IMAGE}:main"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            API_TAGS+=$'\n'"${API_IMAGE}:${VERSION}"
            WEB_TAGS+=$'\n'"${WEB_IMAGE}:${VERSION}"
          fi

          {
            echo "api_tags<<EOF"
            echo "${API_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "web_tags<<EOF"
            echo "${WEB_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.api_tags }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.web_tags }}

      - name: Create deploy bundle
        run: |
          mkdir -p dist
          tar -czf "dist/deploy-bundle-${{ steps.vars.outputs.short_sha }}.tar.gz" deploy README-deploy.md

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle-${{ steps.vars.outputs.short_sha }}
          path: dist/deploy-bundle-${{ steps.vars.outputs.short_sha }}.tar.gz
          if-no-files-found: error
